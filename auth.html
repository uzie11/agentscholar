<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentScholar — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f4; --card: #ffffff; --text: #1a1a18; --sub: #888780;
      --border: rgba(0,0,0,0.12); --focus: rgba(0,0,0,0.35);
      --accent: #185fa5; --success: #3b6d11; --success-bg: #eaf3de;
      --error: #a32d2d; --error-bg: #fcebeb;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'Courier New', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18; --card: #222220; --text: #f0ede8;
        --border: rgba(255,255,255,0.1); --focus: rgba(255,255,255,0.35);
        --accent: #85b7eb; --success: #97c459; --success-bg: #173404;
        --error: #f09595; --error-bg: #501313;
      }
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .wrap { width: 100%; max-width: 400px; }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo-name { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
    .logo-sub { font-size: 12px; color: var(--sub); margin-top: 4px; }
    .card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; }
    .tabs { display: flex; border-bottom: 0.5px solid var(--border); }
    .tab { flex: 1; padding: 14px; font-size: 13px; font-family: var(--font); font-weight: 500; color: var(--sub); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { background: var(--bg); }
    .body { padding: 24px; }
    .panel { display: none; }
    .panel.active { display: block; }
    .group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; font-size: 14px; font-family: var(--font); color: var(--text); background: var(--bg); border: 0.5px solid var(--border); border-radius: 8px; outline: none; transition: border-color 0.15s; }
    input:focus { border-color: var(--focus); }
    input::placeholder { color: var(--sub); }
    .btn { width: 100%; padding: 12px; font-size: 14px; font-family: var(--font); font-weight: 600; color: white; background: var(--accent); border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.15s; margin-top: 8px; }
    .btn:hover { opacity: 0.85; }
    .alert { padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .alert.ok  { display: block; background: var(--success-bg); color: var(--success); }
    .alert.err { display: block; background: var(--error-bg);   color: var(--error); }
    .divider { display: flex; align-items: center; gap: 10px; margin: 20px 0; color: var(--sub); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }
    .social { width: 100%; padding: 10px 12px; font-size: 13px; font-family: var(--font); color: var(--text); background: var(--bg); border: 0.5px solid var(--border); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: border-color 0.15s; margin-bottom: 10px; text-decoration: none; }
    .social:hover { border-color: var(--focus); }
    .pw-bar-wrap { margin-top: 6px; height: 3px; background: var(--border); border-radius: 2px; display: none; }
    .pw-bar { height: 100%; border-radius: 2px; transition: all 0.3s; width: 0; }
    .pw-txt { font-size: 10px; color: var(--sub); margin-top: 4px; display: none; }
    .terms { font-size: 11px; color: var(--sub); text-align: center; margin-top: 16px; line-height: 1.6; }
    .terms a { color: var(--accent); text-decoration: none; }
    .back { display: block; text-align: center; margin-top: 16px; font-size: 12px; color: var(--sub); text-decoration: none; }
    .back:hover { color: var(--text); }
  </style>
</head>
<body>
<div class="wrap">

  <div class="logo">
    <div class="logo-name">AgentScholar</div>
    <div class="logo-sub">multi-agent research analyzer</div>
  </div>

  <div class="card">
    <!-- Zaten giriş yapıldıysa göster -->
    <div id="already-signed" style="display:none;padding:16px 20px;border-bottom:0.5px solid var(--border);">
      <div style="font-size:12px;color:var(--success);margin-bottom:10px;">✓ Already signed in as <strong id="already-name"></strong></div>
      <div style="display:flex;gap:8px;">
        <button onclick="window.location.href='agent4.html'" style="flex:1;padding:8px;font-size:12px;font-family:var(--mono);background:var(--text);color:var(--card);border:none;border-radius:6px;cursor:pointer;">← Go back</button>
        <button onclick="signOut()" style="flex:1;padding:8px;font-size:12px;font-family:var(--mono);background:none;color:var(--danger);border:0.5px solid var(--danger);border-radius:6px;cursor:pointer;">Sign Out</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="go('signin')">Sign In</button>
      <button class="tab" onclick="go('register')">Create Account</button>
    </div>
    <div class="body">
      <div class="alert" id="alert"></div>

      <!-- SIGN IN -->
      <div class="panel active" id="p-signin">
        <div class="group">
          <label>Email</label>
          <input type="email" id="si-email" placeholder="you@example.com">
        </div>
        <div class="group">
          <label>Password</label>
          <input type="password" id="si-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') signIn()">
        </div>
        <button class="btn" onclick="signIn()">Sign In</button>
        <div class="divider">or</div>
        <button class="social" onclick="noBackend()">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
          Continue with Google
        </button>
        <button class="social" onclick="noBackend()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          Continue with GitHub
        </button>
      </div>

      <!-- REGISTER -->
      <div class="panel" id="p-register">
        <div class="group">
          <label>Full Name</label>
          <input type="text" id="rg-name" placeholder="Your name">
        </div>
        <div class="group">
          <label>Email</label>
          <input type="email" id="rg-email" placeholder="you@example.com">
        </div>
        <div class="group">
          <label>Password</label>
          <input type="password" id="rg-pass" placeholder="Min. 8 characters" oninput="strength(this.value)">
          <div class="pw-bar-wrap" id="pw-wrap"><div class="pw-bar" id="pw-bar"></div></div>
          <div class="pw-txt" id="pw-txt"></div>
        </div>
        <div class="group">
          <label>Confirm Password</label>
          <input type="password" id="rg-confirm" placeholder="Repeat password" onkeydown="if(event.key==='Enter') register()">
        </div>
        <button class="btn" onclick="register()">Create Account</button>
        <div class="divider">or</div>
        <button class="social" onclick="noBackend()">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
          Continue with Google
        </button>
        <button class="social" onclick="noBackend()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          Continue with GitHub
        </button>
        <div class="terms">By creating an account you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</div>
      </div>

    </div>
  </div>

  <a class="back" href="agent4.html" onclick="window.history.length>1?window.history.back():true; return window.history.length<=1;">← Back to AgentScholar</a>
</div>

<script>
  function go(tab) {
    document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='signin')||(i===1&&tab==='register')));
    document.getElementById('p-signin').classList.toggle('active', tab==='signin');
    document.getElementById('p-register').classList.toggle('active', tab==='register');
    hide();
  }

  function msg(text, type) { const el=document.getElementById('alert'); el.textContent=text; el.className='alert '+type; }
  function hide() { document.getElementById('alert').className='alert'; }

  function strength(v) {
    const wrap=document.getElementById('pw-wrap'), bar=document.getElementById('pw-bar'), txt=document.getElementById('pw-txt');
    wrap.style.display='block'; txt.style.display='block';
    let s=0;
    if(v.length>=8)s++; if(/[A-Z]/.test(v))s++; if(/[0-9]/.test(v))s++; if(/[^A-Za-z0-9]/.test(v))s++;
    const lvl=[{w:'25%',c:'#a32d2d',t:'Weak'},{w:'50%',c:'#c47a00',t:'Fair'},{w:'75%',c:'#185fa5',t:'Good'},{w:'100%',c:'#3b6d11',t:'Strong'}];
    const l=lvl[Math.max(0,s-1)];
    bar.style.width=l.w; bar.style.background=l.c; txt.textContent=l.t; txt.style.color=l.c;
  }

  function valid(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }

  function signIn() {
    const email=document.getElementById('si-email').value.trim();
    const pass=document.getElementById('si-pass').value;
    if(!email||!pass){msg('Please fill in all fields.','err');return;}
    if(!valid(email)){msg('Invalid email address.','err');return;}
    const users=JSON.parse(localStorage.getItem('agentscholar_users')||'[]');
    const user=users.find(u=>u.email===email&&u.password===pass);
    if(!user){msg('Invalid email or password.','err');return;}
    localStorage.setItem('agentscholar_current_user',JSON.stringify({name:user.name,email:user.email}));
    msg('Welcome back, '+user.name+'! Redirecting...','ok');
    setTimeout(()=>{ window.location.href='agent4.html'; },1200);
  }

  function register() {
    const name=document.getElementById('rg-name').value.trim();
    const email=document.getElementById('rg-email').value.trim();
    const pass=document.getElementById('rg-pass').value;
    const confirm=document.getElementById('rg-confirm').value;
    if(!name||!email||!pass||!confirm){msg('Please fill in all fields.','err');return;}
    if(!valid(email)){msg('Invalid email address.','err');return;}
    if(pass.length<8){msg('Password must be at least 8 characters.','err');return;}
    if(pass!==confirm){msg('Passwords do not match.','err');return;}
    const users=JSON.parse(localStorage.getItem('agentscholar_users')||'[]');
    if(users.find(u=>u.email===email)){msg('An account with this email already exists.','err');return;}
    users.push({name,email,password:pass,created:new Date().toISOString()});
    localStorage.setItem('agentscholar_users',JSON.stringify(users));
    localStorage.setItem('agentscholar_current_user',JSON.stringify({name,email}));
    msg('Account created! Welcome, '+name+'! Redirecting...','ok');
    setTimeout(()=>{ window.location.href='agent4.html'; },1200);
  }

  function noBackend() {
    msg('Google/GitHub sign-in requires a backend server. Use email & password for now.','err');
  }

  function signOut() {
    localStorage.removeItem('agentscholar_current_user');
    localStorage.removeItem('agentscholar_session');
    document.getElementById('already-signed').style.display = 'none';
    document.getElementById('already-name').textContent = '';
  }

  // Zaten giriş yapılmışsa kullanıcı bilgisini göster
  const _sess = localStorage.getItem('agentscholar_current_user');
  if (_sess) {
    const _u = JSON.parse(_sess);
    document.getElementById('already-signed').style.display = 'block';
    document.getElementById('already-name').textContent = _u.name || _u.email;
  }
</script>
</body>
</html>
